name: static analysis

on:
  pull_request:
    paths: &paths
      - 'config/**'
      - 'src/**'
      - 'tests/**'
      - '.github/workflows/static.yml'
      - 'composer.json'
      - 'psalm.xml'
      - 'psalm80.xml'
  push:
    branches: ['master']
    paths: *paths

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  psalm:
    uses: yiisoft/actions/.github/workflows/psalm.yml@master
    with:
      os: >-
        ["ubuntu-latest"]
      php: >-
        ["8.1", "8.2", "8.3"]
  psalm80:
    uses: yiisoft/actions/.github/workflows/psalm.yml@master
    with:
      psalm-config: psalm80.xml
      os: >-
        ["ubuntu-latest"]
      php: >-
        ["8.0"]
